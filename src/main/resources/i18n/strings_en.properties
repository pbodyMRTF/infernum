tutorial.phase10.line1=Pistol  →  Type 3  →  8 damage / bullet
tutorial.phase11.line1=Bayonet — Right click / RB for melee attack
tutorial.phase11.line2=Kill 2+ to regenerate 1 HP, kill 3+ to regenerate 2 HP.
tutorial.phase12.line1=Get close to enemies, use bayonet with right click / RB!
