tutorial.phase2.line1=Enemy Type 1 [Sinner] — Most effective with SMG  [NUM 3]
tutorial.phase3.line1=Fire with SMG, kill the enemy!
tutorial.phase4.line1=SMG — 15 damage / bullet
tutorial.phase5.line1=Enemy Type 2 [Armored Robot] — Most effective with Shotgun  [NUM 2]
